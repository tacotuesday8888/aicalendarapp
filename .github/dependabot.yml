version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/backend/functions"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    groups:
      firebase-backend:
        patterns:
          - "firebase*"
          - "@firebase/*"
          - "firebase-admin"
          - "firebase-functions"
      genkit-ai:
        patterns:
          - "genkit"
          - "@genkit-ai/*"

  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
