name: Backend CI

"on":
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functions:
    name: Firebase Functions
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      AI_PROVIDER: stub
      APP_CHECK_MODE: monitor

    defaults:
      run:
        working-directory: backend/functions

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check public repository safety
        working-directory: ${{ github.workspace }}
        run: bash scripts/check_public_repo_safety.sh

      - name: Detect backend-relevant changes
        id: changes
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || -z "${BASE_SHA:-}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! changed_files="$(git diff --name-only "${BASE_SHA}"...HEAD 2>/dev/null)"; then
            echo "Could not compare against ${BASE_SHA}; running backend checks."
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$changed_files"
          if printf '%s\n' "$changed_files" | grep -Eq '^(backend/functions/|backend/firestore/|backend/storage/|backend/config/\.env\.example$|firebase\.json$|\.firebaserc\.template$|scripts/bootstrap_backend\.sh$|\.github/workflows/backend-ci\.yml$)'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No backend-relevant changes
        if: steps.changes.outputs.backend_changed != 'true'
        run: echo "Skipping backend checks; no backend-relevant files changed."

      - name: Set up Node.js
        if: steps.changes.outputs.backend_changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/functions/package-lock.json

      - name: Set up Java for Firebase emulators
        if: steps.changes.outputs.backend_changed == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        if: steps.changes.outputs.backend_changed == 'true'
        run: npm ci

      - name: Type-check backend
        if: steps.changes.outputs.backend_changed == 'true'
        run: npm run lint

      - name: Type-check backend smoke scripts
        if: steps.changes.outputs.backend_changed == 'true'
        run: npm run typecheck:scripts

      - name: Build backend
        if: steps.changes.outputs.backend_changed == 'true'
        run: npm run build

      - name: Run AI smoke tests
        if: steps.changes.outputs.backend_changed == 'true'
        run: npm run ai:smoke

      - name: Dry-run live smoke request contract
        if: steps.changes.outputs.backend_changed == 'true'
        run: npm run functions:live-smoke
        env:
          LIVE_SMOKE_DRY_RUN: "true"
          LIVE_SMOKE_INCLUDE_PREMIUM_AI: "true"
          FUNCTIONS_BASE_URL: "https://example.invalid/functions"

      - name: Run Firebase rules behavior tests
        if: steps.changes.outputs.backend_changed == 'true'
        run: npm run rules:test
