name: iOS CI

"on":
  workflow_dispatch:
  pull_request:
    paths:
      - "iOSApp/**"
      - "iOSAppTests/**"
      - "iOSAppUITests/**"
      - "aicalendarapp.xcodeproj/**"
      - "Package.swift"
      - "Package.resolved"
      - "aicalendarapp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
      - "scripts/ci_ios.sh"
      - ".github/workflows/ios-ci.yml"
  push:
    branches:
      - main
    paths:
      - "iOSApp/**"
      - "iOSAppTests/**"
      - "iOSAppUITests/**"
      - "aicalendarapp.xcodeproj/**"
      - "Package.swift"
      - "Package.resolved"
      - "aicalendarapp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
      - "scripts/ci_ios.sh"
      - ".github/workflows/ios-ci.yml"

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Debug Simulator Unit Tests
    runs-on: macos-26
    timeout-minutes: 45
    env:
      PROJECT: aicalendarapp.xcodeproj
      SCHEME: aicalendarapp
      CONFIGURATION: Debug
      ONLY_TESTING: aicalendarappTests

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run simulator unit tests
        run: bash scripts/ci_ios.sh

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: aicalendarapp-xcresult
          path: ${{ runner.temp }}/aicalendarapp.xcresult
          if-no-files-found: ignore
          retention-days: 7
