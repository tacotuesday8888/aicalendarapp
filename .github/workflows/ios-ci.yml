name: iOS CI

"on":
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Debug Simulator Unit Tests
    runs-on: macos-26
    timeout-minutes: 45
    env:
      PROJECT: aicalendarapp.xcodeproj
      SCHEME: aicalendarapp
      CONFIGURATION: Debug
      ONLY_TESTING: aicalendarappTests

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect iOS-relevant changes
        id: changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || -z "${BASE_SHA:-}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            echo "ios_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! changed_files="$(git diff --name-only "${BASE_SHA}"...HEAD 2>/dev/null)"; then
            echo "Could not compare against ${BASE_SHA}; running iOS checks."
            echo "ios_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$changed_files"
          if printf '%s\n' "$changed_files" | grep -Eq '^(iOSApp/|iOSAppTests/|iOSAppUITests/|aicalendarapp\.xcodeproj/|Package\.swift$|Package\.resolved$|scripts/ci_ios\.sh$|\.github/workflows/ios-ci\.yml$)'; then
            echo "ios_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ios_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No iOS-relevant changes
        if: steps.changes.outputs.ios_changed != 'true'
        run: echo "Skipping iOS checks; no iOS-relevant files changed."

      - name: Run simulator unit tests
        if: steps.changes.outputs.ios_changed == 'true'
        run: bash scripts/ci_ios.sh

      - name: Upload test result bundle
        if: always() && steps.changes.outputs.ios_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: aicalendarapp-xcresult
          path: ${{ runner.temp }}/aicalendarapp.xcresult
          if-no-files-found: ignore
          retention-days: 7
