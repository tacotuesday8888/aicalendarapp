name: CodeQL

"on":
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "22 10 * * 2"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze backend JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect CodeQL-relevant changes
        id: changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "${GITHUB_EVENT_NAME}" == "schedule" || -z "${BASE_SHA:-}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            echo "codeql_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! changed_files="$(git diff --name-only "${BASE_SHA}"...HEAD 2>/dev/null)"; then
            echo "Could not compare against ${BASE_SHA}; running CodeQL."
            echo "codeql_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$changed_files"
          if printf '%s\n' "$changed_files" | grep -Eq '^(backend/functions/|\.github/workflows/codeql\.yml$)'; then
            echo "codeql_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "codeql_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No CodeQL-relevant changes
        if: steps.changes.outputs.codeql_changed != 'true'
        run: echo "Skipping CodeQL analysis; no backend Functions or CodeQL workflow files changed."

      - name: Initialize CodeQL
        if: steps.changes.outputs.codeql_changed == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        if: steps.changes.outputs.codeql_changed == 'true'
        uses: github/codeql-action/analyze@v4
